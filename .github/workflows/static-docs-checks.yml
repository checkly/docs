name: Static docs checks

# Runs static validations on every PR â€” works without a Mintlify preview URL,
# so it fills the gap for PRs (e.g. the auto-update API spec ones) where the
# preview deployment is skipped or fails.
#
# Required check in the branch ruleset. When no docs files changed the
# conditional steps skip and the job still succeeds.

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: static-docs-checks-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  static-docs-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Detect changed paths
        id: detect
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          MERGE_BASE=$(git merge-base "$BASE_SHA" "$HEAD_SHA")
          CHANGED=$(git diff --name-only "$MERGE_BASE" "$HEAD_SHA")

          if echo "$CHANGED" | grep -q '^api-reference/openapi\.json$'; then
            echo "openapi_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "openapi_changed=false" >> "$GITHUB_OUTPUT"
          fi

          # Same docs-detection regex as docs-gate / preview-checks
          NON_DOCS_RE='^(\.github/|.*\.sh$|[^/]+\.md$|package(-lock)?\.json$|node_modules/|checkly\.config\.ts$|block-headless\.js$|__checks__/)'
          if echo "$CHANGED" | grep -vE "$NON_DOCS_RE" | grep -q .; then
            echo "docs_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "docs_changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate OpenAPI spec
        if: steps.detect.outputs.openapi_changed == 'true'
        run: npx mint openapi-check api-reference/openapi.json

      - name: Broken-links scan (informational)
        if: steps.detect.outputs.docs_changed == 'true'
        run: |
          REPORT=$(mktemp)
          npx mint broken-links > "$REPORT" 2>&1 || true
          {
            echo "## Broken-links scan"
            echo ""
            echo "_Informational only â€” does not fail the PR. See [tracking issue] for cleanup._"
            echo ""
            echo '<details><summary>Full output</summary>'
            echo ""
            echo '```'
            cat "$REPORT"
            echo '```'
            echo ""
            echo '</details>'
          } >> "$GITHUB_STEP_SUMMARY"
