name: Static docs checks

# Runs static validations on every PR — works without a Mintlify preview URL,
# so it fills the gap for PRs (e.g. the auto-update API spec ones) where the
# preview deployment is skipped or fails. Fails the PR if `mint broken-links`
# reports any broken internal links.
#
# Required check in the branch ruleset. When no docs files changed the
# conditional steps skip and the job still succeeds.

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: static-docs-checks-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  static-docs-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed paths
        id: detect
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          MERGE_BASE=$(git merge-base "$BASE_SHA" "$HEAD_SHA")
          CHANGED=$(git diff --name-only "$MERGE_BASE" "$HEAD_SHA")

          if echo "$CHANGED" | grep -q '^api-reference/openapi\.json$'; then
            echo "openapi_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "openapi_changed=false" >> "$GITHUB_OUTPUT"
          fi

          # Same docs-detection regex as docs-gate / preview-checks
          NON_DOCS_RE='^(\.github/|.*\.sh$|[^/]+\.md$|package(-lock)?\.json$|node_modules/|checkly\.config\.ts$|block-headless\.js$|__checks__/)'
          if echo "$CHANGED" | grep -vE "$NON_DOCS_RE" | grep -q .; then
            echo "docs_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "docs_changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node
        if: steps.detect.outputs.openapi_changed == 'true' || steps.detect.outputs.docs_changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        if: steps.detect.outputs.openapi_changed == 'true' || steps.detect.outputs.docs_changed == 'true'
        run: npm ci

      - name: Validate OpenAPI spec
        if: steps.detect.outputs.openapi_changed == 'true'
        run: npx mint openapi-check api-reference/openapi.json

      # Legacy /reference/* redirects are inbound-only, so `mint broken-links`
      # never validates their destinations. Runs on any docs change (.mdx or
      # docs.json) because a page rename/delete is exactly what breaks them.
      - name: Check legacy redirect destinations
        if: steps.detect.outputs.docs_changed == 'true'
        run: python3 .github/scripts/check_redirect_destinations.py

      # The custom sitemap.xml (trailing-slash URLs, overriding Mintlify's
      # auto-generated one) is generated from docs.json navigation. If a nav
      # page is added/renamed/removed without regenerating, the committed
      # sitemap drifts — regenerate and fail if it differs.
      - name: Sitemap up to date
        if: steps.detect.outputs.docs_changed == 'true'
        run: |
          node scripts/generate-sitemap.mjs
          if ! git diff --quiet -- sitemap.xml; then
            echo "::error::sitemap.xml is out of date. Run 'npm run generate-sitemap' and commit the result."
            git --no-pager diff -- sitemap.xml | head -60
            exit 1
          fi

      - name: Broken-links scan
        if: steps.detect.outputs.docs_changed == 'true'
        run: |
          REPORT=$(mktemp)
          STATUS=0
          npx mint broken-links > "$REPORT" 2>&1 || STATUS=$?
          {
            echo "## Broken-links scan"
            echo ""
            echo '<details><summary>Full output</summary>'
            echo ""
            echo '```'
            cat "$REPORT"
            echo '```'
            echo ""
            echo '</details>'
          } >> "$GITHUB_STEP_SUMMARY"
          exit $STATUS
